<script>
(function () {
  const $ = window.jQuery;

  function initDataTable(table) {
    if (!table.id) return;

    const selector = "#" + table.id;

    // पहले से बनी है तो कुछ मत करो
    if ($.fn.DataTable.isDataTable(selector)) return;

    // data आने के बाद ही init करो
    if (table.querySelectorAll("tbody tr").length === 0) return;

    $(selector).DataTable({
      responsive: true,
      pageLength: 10,
      lengthMenu: [5, 10, 25, 50],
      language: {
        search: "Search:",
        lengthMenu: "_MENU_ entries",
        emptyTable: "No Data Found"
      }
    });
  }

  function scanTables() {
    document
      .querySelectorAll("table[data-datatable='true']")
      .forEach(initDataTable);
  }

  window.addEventListener("load", scanTables);

  const observer = new MutationObserver(() => {
    scanTables();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true,
  });
})();
</script>
